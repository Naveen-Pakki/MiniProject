<!DOCTYPE html>
<html>
<head>
    <title>Steganography Web App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .card {
            border-radius: 15px;
            background: #1e293b;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">🔐 Steganography Web App</h2>

    <div class="card p-4 shadow-lg">

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data">

            <input class="form-control mb-3" type="file" name="image" required>

            <textarea class="form-control mb-3" name="message" rows="3"
                placeholder="Enter secret message"></textarea>

            <div class="text-center">
                <button class="btn btn-success me-2" name="encode">Encode</button>
                <button class="btn btn-warning" name="decode">Decode</button>
            </div>

        </form>

        <!-- RESULT -->
        <h5 class="mt-3 text-info">{{ result }}</h5>

        <!-- IMAGES -->
        <div class="row mt-4 text-center">

            {% if original %}
            <div class="col-md-6">
                <h5>📷 Original</h5>
                <img src="{{ url_for('uploaded_file', filename=original) }}">
            </div>
            {% endif %}

            {% if encoded %}
            <div class="col-md-6">
                <h5>🧬 Encoded</h5>
                <img src="{{ url_for('uploaded_file', filename=encoded) }}">

                <br><br>

                <a href="{{ url_for('download_file', filename=encoded) }}">
                    <button class="btn btn-primary">⬇️ Download</button>
                </a>
            </div>
            {% endif %}

        </div>

    </div>

</div>

<!-- ⚠️ CYBER POPUP -->
<script>
    var warning = "{{ warning }}";

    if (warning === "SUSPICIOUS") {
        alert(
        "⚠️ CYBER SECURITY ALERT\n\n" +
        "OFFENSIVE:\n" +
        "This image may contain hidden malicious payload.\n\n" +
        "DEFENSIVE:\n" +
        "- Do not trust unknown images\n" +
        "- Avoid opening suspicious files\n" +
        "- Scan before using\n\n" +
        "Stay safe!"
        );
    }

    if (warning === "NO_MESSAGE") {
        alert("⚠️ No hidden message found in this image.");
    }
</script>

</body>
</html>

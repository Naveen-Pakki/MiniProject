<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Expense Analyzer - Track your spending with smart AI insights.">
    <title>AI Expense Analyzer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header style="position: relative;">
            <button id="theme-toggle" class="btn-theme" title="Toggle Dark Mode">🌙</button>
            <h1>AI Expense Analyzer</h1>
            <p>Smart insights for your daily spending habits</p>
        </header>

        <main class="dashboard">
            <!-- Add Expense Form Panel -->
            <section class="panel add-expense-panel">
                <h2>Add Expense</h2>
                <form id="expense-form">
                    <div class="form-group" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center;">
                        <div class="segmented-control">
                            <input type="radio" id="mode-monthly" name="entryMode" value="monthly">
                            <input type="radio" id="mode-daily" name="entryMode" value="daily" checked>
                            <label for="mode-monthly" class="segment-label">Monthly</label>
                            <label for="mode-daily" class="segment-label">Daily</label>
                            <div class="segment-slider"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" required placeholder="e.g., Groceries, Uber, Coffee"
                            autocomplete="off">
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" required min="1" step="1" placeholder="0">
                        </div>
                        <div class="form-group" style="flex: 1;" id="date-group-container">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem;">
                                <label for="date" style="margin-bottom: 0;">Date</label>
                                <button type="button" id="today-btn" class="btn-today">Today</button>
                            </div>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group" style="flex: 1; display: none;" id="month-group-container">
                            <label for="month-picker">Select Month</label>
                            <input type="month" id="month-picker">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Health">Health</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Education">Education</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add Expense</button>
                </form>
            </section>

            <!-- Total and Insights Panel -->
            <section class="panel summary-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.5); padding-bottom: 0.75rem; margin-bottom: 1rem;">
                    <h2 id="summary-title" style="border: none; padding: 0; margin: 0;">Monthly Overview</h2>
                    <button id="reset-month-btn" class="btn-warning-outline" title="Reset this month's data">🔄 Reset Month</button>
                </div>

                <div
                    style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
                    <div style="font-size: 0.85rem; color: var(--text-light); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;"
                        id="current-month-label">Current Month</div>
                    <div class="total-amount" id="current-month-total" style="margin: 0; font-size: 3.5rem;">₹0</div>

                    <div
                        style="display: flex; gap: 1.5rem; margin-top: 1rem; width: 100%; justify-content: center; text-align: center;">
                        <div style="flex: 1;">
                            <div
                                style="font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem;">
                                <span id="prev-period-label">Previous Month</span></div>
                            <div id="prev-month-total"
                                style="font-weight: 800; color: var(--text-normal); font-size: 1.25rem;">₹0</div>
                        </div>
                        <div style="width: 2px; background-color: rgba(255, 255, 255, 0.4); border-radius: 2px;"></div>
                        <div style="flex: 1;">
                            <div
                                style="font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; margin-bottom: 0.25rem;">
                                <span id="prediction-label">Predicted Total</span></div>
                            <div id="predicted-total"
                                style="font-weight: 800; color: var(--primary); font-size: 1.25rem;">₹0</div>
                        </div>
                    </div>
                </div>

                <div class="ai-section-title">✨ AI Insights</div>
                <div id="ai-suggestions" class="ai-suggestions">
                    <!-- AI Suggestions will be injected here -->
                </div>
            </section>

            <!-- Chart Panel -->
            <section class="panel chart-panel">
                <h2>Distribution</h2>
                <div class="chart-container" style="position: relative;">
                    <canvas id="expense-chart"></canvas>
                    <div id="chart-empty-state" class="empty-state" style="display: none; position: absolute; inset: 0; background: transparent; border: none; align-items: center; justify-content: center;">
                        <div style="text-align: center;">
                            <div style="font-size: 2rem; margin-bottom: 0.5rem;">📊</div>
                            <div style="font-size: 1.1rem; font-weight: 600; color: var(--text-dark);">No data to display</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History Panel -->
            <section class="panel history-panel">
                <h2>Monthly History</h2>
                <div id="history-container" class="history-container">
                    <!-- History cards injected here -->
                </div>
            </section>

            <!-- Expense List Panel -->
            <section class="panel list-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.5); padding-bottom: 0.75rem; margin-bottom: 1rem;">
                    <h2 style="border: none; padding: 0; margin: 0;">Recent Expenses</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="download-report-btn" class="btn-success-outline" title="Download CSV Report">⬇️ Download Report</button>
                        <button id="clear-data-btn" class="btn-clear" title="Clear all data">🗑️ Clear Data</button>
                    </div>
                </div>
                <ul id="expense-list" class="expense-list">
                    <!-- Expense items will be listed here -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>
